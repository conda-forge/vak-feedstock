{% set python_min = "3.12" %}
{% set name = "vak" %}
{% set version = "1.0.5" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/vak-{{ version }}.tar.gz
  sha256: ab256b532f63cc4d3c978ef32dfd529b3923b8368bda110bdc26a7e363d6b9d3

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - vak=vak.__main__:main

requirements:
  host:
    - pip
    - python {{ python_min }}
    - flit-core
  run:
    - attrs >=25.3.0
    - crowsetta >=5.1.3
    - dask >=2025.5.1
    - evfuncs >=0.3.4
    - joblib >=1.5.1
    - lightning >=2.2.4
    - matplotlib-base >=3.9.0
    - numpy >=2.0.0
    - pandas >=2.2.0
    - pynndescent >=0.5.13
    - python >={{ python_min }}
    - scipy >=1.12.0
    - pysoundfile >=0.13.1
    - tensorboard >=2.8.0
    - tomlkit >=0.12.4
    - pytorch >=2.7.0
    - torchvision >=0.22.0
    - tqdm >=4.67.1
    - umap-learn >=0.5.9

test:
  imports:
    - vak
  commands:
    - pip check
    - vak --help
  requires:
    # place temporary upper bound on pip so pip check does not fail on soundfile
    # see https://github.com/conda-forge/pysoundfile-feedstock/issues/22
    - pip <24.2
    - python {{ python_min }}

about:
  home: https://pypi.org/project/vak/
  summary: a neural network toolbox for animal vocalizations and bioacoustics
  dev_url: https://github.com/vocalpy/vak
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - NickleDave
